name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          MAIN=$(du -k dist/assets/index-*.js | awk '{sum+=$1} END{print sum}')
          echo "Main bundle: ${MAIN}KB (limit: 500KB)"
          if [ "$MAIN" -gt 500 ]; then
            echo "ERROR: Main bundle exceeds 500KB (${MAIN}KB)"
            exit 1
          fi

          TOTAL=$(du -k dist/assets/*.js dist/assets/chunks/*.js 2>/dev/null | awk '{sum+=$1} END{print sum}')
          echo "Total JS: ${TOTAL}KB (limit: 1000KB)"
          if [ "$TOTAL" -gt 1000 ]; then
            echo "ERROR: Total JS exceeds 1000KB (${TOTAL}KB)"
            exit 1
          fi

          echo "Bundle OK — main ${MAIN}KB, total ${TOTAL}KB"
